{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <div class="card border-danger">
        <div class="card-body">
            <h4 class="text-danger">Delete Test</h4>

            <p>
                Are you sure you want to delete the test
                <strong>{{ test.name }}</strong>?
            </p>

            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">
                    Yes, Delete
                </button>
                <a href="{% url 'core:test_list' %}" class="btn btn-secondary">
                    Cancel
                </a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
