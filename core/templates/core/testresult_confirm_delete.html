{% extends "base.html" %}
{% block content %}

<h4>Delete TestResult</h4>
<p>Are you sure you want to delete this result?</p>

<form method="post">
    {% csrf_token %}
    <button class="btn btn-danger">Yes, delete</button>
    <a href="{% url 'core:patienttest_detail' result.patienttest.id %}" class="btn btn-secondary">
        Cancel
    </a>
</form>

{% endblock %}
