{% extends "base.html" %}
{% block content %}

<h3>Confirm Delete</h3>

<p>
    {{ patienttest.patient }} - {{ patienttest.test }}
</p>

<form method="post">
    {% csrf_token %}
    <button class="btn btn-danger">Delete</button>
    <a href="{% url 'core:patienttest_list' %}" class="btn btn-secondary">
        Cancel
    </a>
</form>

{% endblock %}
