{% extends "base.html" %}
{% block content %}

<h3>TestResult Form</h3>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}

    <button class="btn btn-primary">Save</button>
    <a href="{% url 'core:testresult_detail' form.instance.pk %}" class="btn btn-secondary">
        Cancel
    </a>
</form>

{% endblock %}
